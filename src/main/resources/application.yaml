spring:
  application:
    name: product-service
  profiles:
    active: dev

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/cruddb}
    driver-class-name: ${DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:Postgres@123}

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always


server:
  port: 8080
  servlet:
    context-path: /product-service